<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bravo ! - Margesure Pro</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 50px; }
        .code-box { background: #111; border: 2px solid #E5A93C; padding: 20px; border-radius: 15px; display: inline-block; margin: 20px; }
        .gold { color: #E5A93C; font-weight: bold; font-size: 24px; }
        .btn { background: #E5A93C; color: #000; padding: 15px 30px; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Paiement Confirmé ! 🚀</h1>
    <p>Merci pour votre confiance. Voici vos accès personnels :</p>
    
    <div class="code-box">
        <p>Votre Clé d'Accès Unique :</p>
        <div id="key-display" class="gold">Calcul en cours...</div>
    </div>

    <p>Gardez bien cette clé, elle vous sera demandée pour déverrouiller l'outil.</p>
    <br><br>
    <a href="app.html" class="btn">ACCÉDER À L'OUTIL PRO</a>

    <script>
        // On récupère l'ID dans l'URL (ex: success.html?id=100)
        const urlParams = new URLSearchParams(window.location.search);
        const transID = urlParams.get('id');

        if(transID) {
            const secretKey = (parseFloat(transID) + 13) * 13.5;
            document.getElementById('key-display').innerText = secretKey;
        } else {
            document.getElementById('key-display').innerText = "Erreur d'ID";
        }
    </script>
</body>
</html>
