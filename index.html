<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MARGE-SÛRE PRO : EXPERT BÂTIMENT</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { 
            --p: #0A84FF; --bg: #000; --card: #1C1C1E; 
            --green: #32D74B; --red: #FF453A; --blue: #0A84FF; 
            --orange: #FF9500; --gray: #8E8E93; 
        }
        .theme-plombier { --p: #0A84FF; }
        .theme-elec { --p: #FFCC00; }
        .theme-peintre { --p: #32D74B; }

        * { -webkit-user-select: none; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; touch-action: manipulation; }
        input, select, textarea { -webkit-user-select: text !important; outline: none; }
        body { background-color: var(--bg); color: white; margin: 0; padding: env(safe-area-inset-top) 15px 140px 15px; }

        .card { background: var(--card); padding: 20px; border-radius: 22px; margin-bottom: 12px; border: 1px solid #2C2C2E; }
        .net-display { font-size: 38px; font-weight: 900; color: var(--green); letter-spacing: -1px; margin: 5px 0; }
        .delta-pill { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 800; margin-top: 5px; }
        
        .grid-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .col-label { font-size: 9px; color: var(--gray); font-weight: 800; text-transform: uppercase; text-align: center; margin-bottom: 5px; }

        .tab { padding: 12px 18px; border-radius: 14px; background: #2C2C2E; color: var(--gray); font-size: 11px; font-weight: 800; border: none; min-width: 100px; flex-shrink: 0; }
        .tab.active { background: var(--p); color: #000; }
        
        input, select { width: 100%; background: #2C2C2E; padding: 15px; border-radius: 12px; color: white; border: 1px solid #3A3A3C; font-size: 16px; }
        label { display: flex; align-items: center; color: var(--gray); font-size: 10px; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }

        .btn-main { background: var(--p); color: #000; border: none; padding: 20px; border-radius: 18px; font-size: 14px; font-weight: 900; text-transform: uppercase; width: 100%; }
        .btn-add { background: var(--blue); color: white; border-radius: 14px; padding: 15px; border: none; font-weight: 900; }

        /* Dossiers */
        .folder-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #1C1C1E; border-radius: 20px; margin-bottom: 10px; border: 1px solid #333; border-left: 5px solid var(--p); position: relative; }
        .btn-quick-del { background: rgba(255, 69, 58, 0.15); color: var(--red); border: none; width: 35px; height: 35px; border-radius: 10px; font-weight: bold; margin-left: 15px; z-index: 10; }

        #context-menu { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; justify-content: center; align-items: center; }
        .menu-box { background: #1C1C1E; width: 80%; border-radius: 25px; padding: 10px; border: 1px solid #333; }
        .menu-item { padding: 20px; text-align: center; font-weight: 800; border-bottom: 1px solid #333; }
        .menu-item.red { color: var(--red); border-bottom: none; }

        .header-audit { background: linear-gradient(180deg, #1C1C1E 0%, #000 100%); padding: 25px; border-radius: 30px; border: 1px solid #333; margin: 15px 0; display: flex; align-items: center; justify-content: space-between; }
        #main-chart { width: 55px; height: 55px; border-radius: 50%; border: 3px solid #333; }
        
        .action-bar { position: fixed; bottom: 30px; left: 15px; right: 15px; display: flex; gap: 10px; z-index: 1000; }
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
    </style>
</head>
<body class="theme-plombier">

    <div id="lock-screen">
        <div style="font-size:35px; font-weight:900; color:white; margin-bottom:10px;">MARGE<span style="color:var(--p)">SÛRE</span></div>
        <div id="id-display" style="background:#1C1C1E; padding:10px; border-radius:12px; color:var(--p); font-weight:bold; margin-bottom:20px; border:1px solid #333;">ID : ...</div>
        <input type="number" id="keyIn" placeholder="CLÉ D'ACCÈS ARTISAN">
        <button class="btn-main" onclick="unlock()" style="margin-top:15px;">DÉVERROUILLER</button>
        <button onclick="requestKey()" style="background:none; border:none; color:var(--p); margin-top:20px; text-decoration:underline;">DEMANDER MA CLÉ (WHATSAPP)</button>
    </div>

    <div id="app" style="display:none;">
        
        <div id="view-folders">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:20px;">
                <h2 style="margin:0;">📂 MES CHANTIERS</h2>
                <button onclick="toggleSetup()" style="background:var(--card); border:1px solid #333; padding:10px; border-radius:15px; color:var(--p); font-size:10px; font-weight:800;">⚙️ CONFIG</button>
            </div>
            <div id="folder-list"></div>
            <button class="btn-main" style="background: var(--blue); color: white; margin-top: 20px;" onclick="createNewDossier()">+ NOUVEAU CHANTIER</button>
        </div>

        <div id="view-edit" style="display:none;">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
                <button onclick="saveAndQuit()" style="background:none; border:none; color:var(--p); font-weight:900;">⬅ RETOUR</button>
                <div style="display:flex; align-items:center; gap:15px;">
                    <img id="pdf-logo-view" src="" style="max-height:25px; display:none;">
                    <button onclick="deleteCurrent()" style="background:none; border:none; font-size:18px;">🗑️</button>
                </div>
            </div>

            <div class="header-audit">
                <div>
                    <div id="res-net" class="net-display">0 €</div>
                    <div style="font-size:10px; font-weight:900; opacity:0.7;">BÉNÉFICE NET RÉEL</div>
                    <div id="delta-display" class="delta-pill" style="display:none;"></div>
                </div>
                <div id="main-chart"></div>
            </div>

            <div style="display:flex; gap:8px; margin-bottom:15px; overflow-x: auto;">
                <button id="tab-plombier" class="tab active" onclick="changeJob('plombier')">💧 PLOMBERIE</button>
                <button id="tab-elec" class="tab" onclick="changeJob('elec')">⚡ ÉLEC</button>
                <button id="tab-peintre" class="tab" onclick="changeJob('peintre')">🎨 PEINTURE</button>
            </div>

            <div class="card">
                <label>👤 CLIENT & CHANTIER</label>
                <input type="text" id="client" placeholder="Nom du client" oninput="calc()">
                <div class="grid-compare" style="margin-top:10px;">
                    <div><label>PRIX VENDU TTC</label><input type="number" id="ttc" oninput="calc()"></div>
                    <div>
                        <label>RÉGIME TVA</label>
                        <select id="tva" onchange="calc()">
                            <option value="1.10">10%</option>
                            <option value="1.20">20%</option>
                            <option value="1.055">5.5%</option>
                            <option value="1.00">AUTO-ENTR. (0%)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card" style="border: 1px solid var(--blue);">
                <label>📦 RENTABILITÉ MATÉRIEL</label>
                <div class="grid-compare"><div class="col-label">Prévu</div><div class="col-label">Réel</div></div>
                <div class="grid-compare">
                    <input type="number" id="matos_prev" placeholder="Estimation" oninput="calc()">
                    <div style="display:flex; gap:5px;">
                        <input type="number" id="matos_real" placeholder="Total" oninput="calc()" style="flex:1">
                        <button class="btn-add" onclick="addTicket()">+</button>
                    </div>
                </div>
                <button onclick="toggleCat()" style="width:100%; background:none; border:1px dashed #444; color:var(--gray); font-size:10px; padding:10px; border-radius:10px; margin-top:10px;">+ CATALOGUE ARTICLES</button>
            </div>

            <div class="card">
                <div class="grid-compare">
                    <div><label>DURÉE (JOURS)</label><input type="number" id="jours" oninput="calc()"></div>
                    <div><label>FRAIS DIVERS</label><input type="number" id="divers" oninput="calc()"></div>
                </div>
            </div>

            <div id="job-module" class="card"></div>

            <div class="action-bar">
                <button class="btn-main" style="background:#2C2C2E; color:white; flex:1;" onclick="exportPDF()">📄 PDF</button>
                <button class="btn-main" style="flex:2;" onclick="saveAndQuit()">💾 ENREGISTRER</button>
            </div>
        </div>

        <div id="cat-view" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:3000; padding:30px;">
            <h3 style="color:var(--blue);">📦 ARTICLES FRÉQUENTS</h3>
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <input type="text" id="cat-name" placeholder="Article" style="flex:2;">
                <input type="number" id="cat-price" placeholder="€" style="flex:1;">
                <button class="btn-add" onclick="addToCatalog()">+</button>
            </div>
            <div id="cat-full-list" style="max-height:60vh; overflow-y:auto;"></div>
            <button class="btn-main" onclick="toggleCat()" style="margin-top:20px;">FERMER</button>
        </div>

        <div id="setup-view" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:4000; padding:30px; overflow-y:auto;">
            <h2 style="color:var(--p);">⚙️ CONFIGURATION</h2>
            <label>NOM ENTREPRISE</label>
            <input type="text" id="set-company" oninput="saveGlobal()">
            <div class="grid-compare">
                <div><label>% URSSAF</label><input type="number" id="set-urssaf" value="21.2" oninput="saveGlobal()"></div>
                <div><label>TVA ACHAT (%)</label><input type="number" id="set-tva-achat" value="20" oninput="saveGlobal()"></div>
            </div>
            <label>SALAIRE NET JOUR CIBLÉ (€)</label>
            <input type="number" id="set-salaire" value="150" oninput="saveGlobal()">
            <button class="btn-main" onclick="toggleSetup()" style="margin-top:20px;">FERMER</button>
        </div>

        <div id="context-menu" onclick="closeMenu()">
            <div class="menu-box" onclick="event.stopPropagation()">
                <div class="menu-item" onclick="duplicateCurrent()">Dupliquer ce chantier</div>
                <div class="menu-item red" onclick="deleteCurrent()">Supprimer définitivement</div>
            </div>
        </div>
    </div>

    <script>
        let currentId = null;
        let pressTimer;
        let myCatalog = JSON.parse(localStorage.getItem('ms_cat')) || [];

        window.onload = () => {
            const deviceID = localStorage.getItem('ms_id') || Math.floor(Math.random()*899)+101;
            localStorage.setItem('ms_id', deviceID);
            document.getElementById('id-display').innerText = "ID APPAREIL : " + deviceID;
            loadGlobal();
            if(localStorage.getItem('ms_ok') === 'true') run();
        };

        function unlock() {
            const k = document.getElementById('keyIn').value;
            const logic = Math.round((parseInt(localStorage.getItem('ms_id')) + 13) * 13.5);
            if(k == "061266" || k == logic) { localStorage.setItem('ms_ok', 'true'); run(); }
            else alert("Clé invalide");
        }

        function run() {
            document.getElementById('lock-screen').style.display='none';
            document.getElementById('app').style.display='block';
            renderFolders();
            changeJob('plombier');
        }

        // --- BLINDAGE DE LA SUPPRESSION ---
        function deleteCurrent(idToDelete = null) {
            const targetId = idToDelete || currentId;
            if(!targetId) return;

            if(confirm("Supprimer ce chantier définitivement ?")) {
                // INSTRUCTION CRUCIALE : On désactive le lien vers le dossier avant de supprimer
                // Cela bloque toute fonction saveCurrent() qui s'exécuterait en parallèle
                const isWorkingOnIt = (targetId === currentId);
                if (isWorkingOnIt) currentId = null; 

                localStorage.removeItem(targetId);
                let folders = JSON.parse(localStorage.getItem('ms_folders')) || [];
                folders = folders.filter(f => f.id !== targetId);
                localStorage.setItem('ms_folders', JSON.stringify(folders));
                
                closeMenu();
                if(isWorkingOnIt) {
                    document.getElementById('view-folders').style.display='block';
                    document.getElementById('view-edit').style.display='none';
                }
                renderFolders();
            }
        }

        function duplicateCurrent() {
            const d = JSON.parse(localStorage.getItem(currentId));
            const newId = 'd_' + Date.now();
            const newData = {...d, id: newId, name: d.name + " (Copie)"};
            localStorage.setItem(newId, JSON.stringify(newData));
            let folders = JSON.parse(localStorage.getItem('ms_folders')) || [];
            folders.unshift(newData);
            localStorage.setItem('ms_folders', JSON.stringify(folders));
            closeMenu();
            renderFolders();
        }

        function renderFolders() {
            const list = document.getElementById('folder-list');
            const f = JSON.parse(localStorage.getItem('ms_folders')) || [];
            list.innerHTML = f.map(i => `
                <div class="folder-item" data-id="${i.id}" onclick="openDossier('${i.id}')">
                    <div style="flex:1"><b>${i.name || 'Sans Nom'}</b><br><small>${i.date}</small></div>
                    <div style="font-weight:900; color:${i.lastNet<0?'var(--red)':'var(--green)'}">${i.lastNet} €</div>
                    <button class="btn-quick-del" onclick="event.stopPropagation(); deleteCurrent('${i.id}')">✕</button>
                </div>
            `).join('');
            initLongPress();
        }

        function initLongPress() {
            document.querySelectorAll('.folder-item').forEach(item => {
                item.addEventListener('touchstart', () => {
                    pressTimer = window.setTimeout(() => {
                        currentId = item.dataset.id;
                        document.getElementById('context-menu').style.display = 'flex';
                    }, 800);
                });
                item.addEventListener('touchend', () => clearTimeout(pressTimer));
            });
        }

        function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }

        // --- MÉTIER & CALCULS ---
        function openDossier(id) {
            currentId = id;
            const d = JSON.parse(localStorage.getItem(id));
            const fields = ['client', 'ttc', 'matos_prev', 'matos_real', 'jours', 'divers'];
            fields.forEach(f => document.getElementById(f).value = d[f] || "");
            document.getElementById('view-folders').style.display='none';
            document.getElementById('view-edit').style.display='block';
            calc();
        }

        function createNewDossier() {
            currentId = 'd_' + Date.now();
            ['client', 'ttc', 'matos_prev', 'matos_real', 'jours', 'divers'].forEach(f => document.getElementById(f).value = "");
            document.getElementById('view-folders').style.display='none';
            document.getElementById('view-edit').style.display='block';
        }

        function calc() {
            if(!currentId) return; // Sécurité anti-bug suppression
            const ttc = parseFloat(document.getElementById('ttc').value) || 0;
            const tvaVente = parseFloat(document.getElementById('tva').value) || 1;
            const ht = ttc / tvaVente;
            const urssaf = (parseFloat(document.getElementById('set-urssaf').value) || 0) / 100;
            const tvaAchat = 1 + ((parseFloat(document.getElementById('set-tva-achat').value) || 20) / 100);
            
            const matosRealHT = (parseFloat(document.getElementById('matos_real').value) || 0) / tvaAchat;
            const matosPrevHT = (parseFloat(document.getElementById('matos_prev').value) || 0) / tvaAchat;
            const jr = parseFloat(document.getElementById('jours').value) || 1;
            const sal = (parseFloat(document.getElementById('set-salaire').value) || 0) * jr;

            const netReal = ht - (ht * urssaf) - matosRealHT - (parseFloat(document.getElementById('divers').value)||0) - sal;
            const netPrev = ht - (ht * urssaf) - matosPrevHT - (parseFloat(document.getElementById('divers').value)||0) - sal;

            const res = document.getElementById('res-net');
            res.innerText = Math.round(netReal) + " €";
            res.style.color = netReal < 0 ? "var(--red)" : "var(--green)";

            const deltaEl = document.getElementById('delta-display');
            if(document.getElementById('matos_prev').value) {
                deltaEl.style.display = 'inline-block';
                const delta = netReal - netPrev;
                deltaEl.innerText = (delta >= 0 ? "+" : "") + Math.round(delta) + "€";
                deltaEl.style.color = delta >= 0 ? "var(--green)" : "var(--red)";
                deltaEl.style.background = delta >= 0 ? "rgba(50,215,75,0.1)" : "rgba(255,69,58,0.1)";
            }
            saveCurrent();
        }

        function saveCurrent() {
            if(!currentId) return;
            const data = {
                id: currentId,
                name: document.getElementById('client').value,
                ttc: document.getElementById('ttc').value,
                matos_prev: document.getElementById('matos_prev').value,
                matos_real: document.getElementById('matos_real').value,
                jours: document.getElementById('jours').value,
                divers: document.getElementById('divers').value,
                lastNet: document.getElementById('res-net').innerText.replace(' €',''),
                date: new Date().toLocaleDateString('fr-FR')
            };
            localStorage.setItem(currentId, JSON.stringify(data));
            let folders = JSON.parse(localStorage.getItem('ms_folders')) || [];
            folders = folders.filter(f => f.id !== currentId);
            folders.unshift(data);
            localStorage.setItem('ms_folders', JSON.stringify(folders.slice(0, 10)));
        }

        // --- CATALOGUE & CONFIG ---
        function toggleCat() { const v = document.getElementById('cat-view'); v.style.display = v.style.display==='none'?'block':'none'; renderCatalog(); }
        function addTicket() { const val = prompt("Montant TTC :"); if(val) { document.getElementById('matos_real').value = (parseFloat(document.getElementById('matos_real').value||0) + parseFloat(val.replace(',','.'))).toFixed(2); calc(); } }
        function addToCatalog() { const n = document.getElementById('cat-name').value, p = document.getElementById('cat-price').value; if(n && p) { myCatalog.push({ n, p: parseFloat(p) }); localStorage.setItem('ms_cat', JSON.stringify(myCatalog)); renderCatalog(); } }
        function renderCatalog() { document.getElementById('cat-full-list').innerHTML = myCatalog.map((i, idx) => `<div style="display:flex; justify-content:space-between; padding:15px; background:#2C2C2E; border-radius:12px; margin-bottom:5px;"><span onclick="applyCat(${i.p})"><b>${i.n}</b> - ${i.p}€</span><button onclick="delCat(${idx})" style="color:var(--red); border:none; background:none;">✕</button></div>`).join(''); }
        function applyCat(p) { document.getElementById('matos_real').value = (parseFloat(document.getElementById('matos_real').value||0) + p).toFixed(2); toggleCat(); calc(); }
        function delCat(i) { myCatalog.splice(i,1); localStorage.setItem('ms_cat', JSON.stringify(myCatalog)); renderCatalog(); }
        function saveGlobal() { localStorage.setItem('ms_global', JSON.stringify({ c: document.getElementById('set-company').value, u: document.getElementById('set-urssaf').value, t: document.getElementById('set-tva-achat').value, s: document.getElementById('set-salaire').value })); }
        function loadGlobal() { const g = JSON.parse(localStorage.getItem('ms_global')); if(g) { document.getElementById('set-company').value=g.c; document.getElementById('set-urssaf').value=g.u; document.getElementById('set-tva-achat').value=g.t; document.getElementById('set-salaire').value=g.s; } }
        function toggleSetup() { const s = document.getElementById('setup-view'); s.style.display = s.style.display==='none'?'block':'none'; }
        function saveAndQuit() { saveCurrent(); document.getElementById('view-folders').style.display='block'; document.getElementById('view-edit').style.display='none'; renderFolders(); }
        function changeJob(j) { document.body.className = 'theme-' + j; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById('tab-' + j).classList.add('active'); calc(); }
        function exportPDF() { html2pdf().from(document.getElementById('view-edit')).set({ margin: 10, filename: 'Bilan.pdf', html2canvas: { scale: 2, backgroundColor: '#000' } }).save(); }
        function requestKey() { window.open(`https://wa.me/33786954881?text=ID:${localStorage.getItem('ms_id')}`); }
    </script>
</body>
</html>
