MargeSure 


<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MARGE-SÛRE PRO</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { 
            --p: #0A84FF; --bg: #000; --card: #1C1C1E; 
            --green: #32D74B; --red: #FF453A; --blue: #0A84FF; 
            --orange: #FF9500; --gray: #8E8E93; 
        }
        .theme-plombier { --p: #0A84FF; }
        .theme-elec { --p: #FFCC00; }
        .theme-peintre { --p: #32D74B; }

        * { -webkit-user-select: none; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; touch-action: manipulation; }
        input, select { -webkit-user-select: text !important; outline: none; }
        body { background-color: var(--bg); color: white; margin: 0; padding: env(safe-area-inset-top) 15px 140px 15px; }

        .card { background: var(--card); padding: 20px; border-radius: 22px; margin-bottom: 12px; border: 1px solid #2C2C2E; }
        .net-display { font-size: 42px; font-weight: 900; color: var(--green); text-align: center; margin: 10px 0; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        input, select { width: 100%; background: #2C2C2E; padding: 15px; border-radius: 12px; color: white; border: 1px solid #3A3A3C; font-size: 16px; margin-top: 5px; }
        label { color: var(--gray); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .btn-main { background: var(--p); color: #000; border: none; padding: 20px; border-radius: 18px; font-size: 14px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
        
        /* Style du Graphique */
        .chart-container { position: relative; height: 220px; margin: 20px 0; }
        
        .badge-marge { display: inline-block; padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: 900; margin-bottom: 15px; }
        
        .action-bar { position: fixed; bottom: 30px; left: 15px; right: 15px; display: flex; gap: 10px; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 28px; backdrop-filter: blur(15px); border: 1px solid #333; }
        
        .folder-item { padding: 20px; background: #1C1C1E; border-radius: 20px; margin-bottom: 10px; border-left: 6px solid var(--p); display: flex; justify-content: space-between; align-items: center; border-right: 1px solid #333; }

        @media print { .action-bar, .tabs-row { display: none !important; } }
    </style>
</head>
<body class="theme-plombier">

    <div id="lock-screen" style="text-align: center; padding: 100px 20px;">
        <h1 style="font-size:40px; font-weight:900; letter-spacing: -2px;">MARGE<span style="color:var(--p)">SÛRE</span></h1>
        <p style="color:var(--gray); font-weight: 600;">L'outil de rentabilité des pros</p>
        <input type="password" id="keyIn" placeholder="CLÉ D'ACCÈS" style="width: 100%; max-width: 300px; text-align: center;">
        <button class="btn-main" onclick="unlock()" style="width: 100%; max-width: 300px; margin-top: 20px;">DÉVERROUILLER</button>
    </div>

    <div id="app" style="display:none;">
        
        <div id="view-folders">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:20px; padding: 0 5px;">
                <h2 style="margin:0; font-size: 28px;">Mes Chantiers</h2>
                <button onclick="toggleSetup()" style="background: #1C1C1E; border: 1px solid #333; color: var(--gray); padding: 10px 15px; border-radius: 12px; font-weight: bold;">Réglages</button>
            </div>
            <div id="folder-list"></div>
            <button class="btn-main" style="margin-top: 20px; background: var(--blue); color: white;" onclick="createNewDossier()">+ Nouveau Devis / Chantier</button>
        </div>

        <div id="view-edit" style="display:none;">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
                <button onclick="saveAndQuit()" style="color:var(--p); background:none; border:none; font-weight:900; font-size: 16px;">⬅ RETOUR</button>
                <div id="marge-badge" class="badge-marge">ANALYSE...</div>
            </div>

            <div class="card" style="padding-top: 10px;">
                <div class="chart-container">
                    <canvas id="rentaChart"></canvas>
                </div>
                <div id="res-net" class="net-display">0 €</div>
                <div style="text-align:center; font-size:11px; color:var(--gray); font-weight:800; text-transform: uppercase;">Reste en poche (Bénéfice Net)</div>
            </div>

            <div class="card">
                <label>Information Client</label>
                <input type="text" id="client" placeholder="Ex: Mr Martin - Salle de bain" oninput="calc()">
                <div class="grid-2" style="margin-top:10px;">
                    <div>
                        <label>Vendu TTC (€)</label>
                        <input type="number" id="ttc" oninput="calc()" placeholder="0">
                    </div>
                    <div>
                        <label>Taux TVA</label>
                        <select id="tva" onchange="calc()">
                            <option value="1.10">10% (Rénov)</option>
                            <option value="1.20">20% (Neuf)</option>
                            <option value="1.055">5.5% (RGE)</option>
                            <option value="1.00">0% (Auto-Entrep.)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card" style="border: 1px solid var(--p);">
                <label>Matériel (TTC)</label>
                <div class="grid-2">
                    <div><span style="font-size:9px; color:var(--gray)">BUDGET VENDU</span><input type="number" id="matos_prev" oninput="calc()"></div>
                    <div><span style="font-size:9px; color:var(--gray)">ACHAT RÉEL</span><input type="number" id="matos_real" oninput="calc()"></div>
                </div>
                <div id="marge-matos-info" style="margin-top:10px; font-size:11px; font-weight:bold; color:var(--p);"></div>
            </div>

            <div class="card">
                <label>Temps & Logistique</label>
                <div class="grid-2">
                    <div><span style="font-size:9px; color:var(--gray)">JOURS DE TRAVAIL</span><input type="number" id="jours" oninput="calc()" value="1"></div>
                    <div><span style="font-size:9px; color:var(--gray)">KM (TOTAL)</span><input type="number" id="distance" oninput="calc()"></div>
                </div>
            </div>

            <div class="action-bar">
                <button class="btn-main" style="background:#2C2C2E; color:white; flex:1;" onclick="window.print()">📄 Rapport</button>
                <button class="btn-main" style="flex:2;" onclick="saveAndQuit()">💾 Sauvegarder</button>
            </div>
        </div>

        <div id="setup-view" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:9999; padding:30px;">
            <h2 style="color:var(--p); margin-top: 0;">⚙️ Configuration Pro</h2>
            <label>Régime d'entreprise</label>
            <select id="set-regime" onchange="saveGlobal()">
                <option value="micro">Auto-Entrepreneur (URSSAF sur CA)</option>
                <option value="societe">Société (Charges sur Marge)</option>
            </select>
            <div class="grid-2" style="margin-top:15px;">
                <div><label>% Charges</label><input type="number" id="set-urssaf" value="21.2" oninput="saveGlobal()"></div>
                <div><label>Indemnité Km</label><input type="number" id="set-km" value="0.60" oninput="saveGlobal()"></div>
            </div>
            <div style="margin-top:15px;">
                <label>Salaire Jour Net Souhaité (€)</label>
                <input type="number" id="set-salaire" value="180" oninput="saveGlobal()">
            </div>
            <button class="btn-main" onclick="toggleSetup()" style="margin-top:30px;">Enregistrer & Fermer</button>
        </div>
    </div>

    <script>
        let myChart;
        let currentId = null;

        window.onload = () => {
            loadGlobal();
            initChart();
            if(localStorage.getItem('ms_ok') === 'true') run();
        };

        function unlock() {
            if(document.getElementById('keyIn').value === "2026") { 
                localStorage.setItem('ms_ok', 'true'); 
                run(); 
            } else { alert("Code incorrect"); }
        }

        function run() {
            document.getElementById('lock-screen').style.display='none';
            document.getElementById('app').style.display='block';
            renderFolders();
        }

        function initChart() {
            const ctx = document.getElementById('rentaChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Matériel', 'État/Taxes', 'Frais/Km', 'Ton Bénéfice'],
                    datasets: [{
                        data: [25, 25, 25, 25],
                        backgroundColor: ['#FF9500', '#FF453A', '#8E8E93', '#32D74B'],
                        borderWidth: 0,
                        cutout: '80%'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    animation: { duration: 800 }
                }
            });
        }

        function calc() {
            if(!currentId) return;

            // Paramètres globaux
            const regime = document.getElementById('set-regime').value;
            const urssafRate = (parseFloat(document.getElementById('set-urssaf').value) || 0) / 100;
            const prixKm = parseFloat(document.getElementById('set-km').value) || 0;
            const salaireJour = parseFloat(document.getElementById('set-salaire').value) || 0;

            // Données chantier
            const ttc = parseFloat(document.getElementById('ttc').value) || 0;
            const tvaTaux = parseFloat(document.getElementById('tva').value) || 1;
            const ht = ttc / tvaTaux;
            const matosReal = parseFloat(document.getElementById('matos_real').value) || 0;
            const matosPrev = parseFloat(document.getElementById('matos_prev').value) || 0;
            const jours = parseFloat(document.getElementById('jours').value) || 0;
            const dist = parseFloat(document.getElementById('distance').value) || 0;

            // Calculs
            const tvaMontant = ttc - ht;
            let cotisations = (regime === 'micro') ? (ttc * urssafRate) : ((ht - matosReal) * urssafRate);
            const totalEtat = tvaMontant + cotisations;
            const fraisLogistique = dist * prixKm;
            const salaireTotal = jours * salaireJour;
            
            // Le Net Réel (ce qui reste après avoir payé TOUT, même ton propre salaire)
            const netFinal = ht - matosReal - cotisations - fraisLogistique - salaireTotal;

            // Affichage
            document.getElementById('res-net').innerText = Math.round(netFinal) + " €";
            document.getElementById('res-net').style.color = netFinal < 0 ? "var(--red)" : "var(--green)";

            // Update Graphique (on sature à 0 si négatif pour le visuel)
            myChart.data.datasets[0].data = [
                Math.max(0, matosReal),
                Math.max(0, totalEtat),
                Math.max(0, fraisLogistique),
                Math.max(0, netFinal + salaireTotal) // On groupe salaire + bénéfice pour le visuel "Revenu"
            ];
            myChart.update();

            // Badge Santé
            const badge = document.getElementById('marge-badge');
            const margePourcent = (ht > 0) ? (netFinal / ht) * 100 : 0;
            if(netFinal < 0) { badge.innerText = "❌ DANGER : PERTE"; badge.style.background = "var(--red)"; }
            else if(margePourcent < 15) { badge.innerText = "⚠️ ATTENTION : MARGE FAIBLE"; badge.style.background = "var(--orange)"; }
            else { badge.innerText = "💰 CHANTIER SAIN"; badge.style.background = "var(--green)"; }

            // Coeff Matos
            if(matosReal > 0) {
                const coeff = (matosPrev / matosReal).toFixed(2);
                document.getElementById('marge-matos-info').innerText = `Coeff. Marge Matos : x${coeff}`;
            }

            saveCurrent();
        }

        // --- PERSISTENCE & NAVIGATION ---

        function createNewDossier() {
            currentId = 'd_' + Date.now();
            document.getElementById('client').value = "";
            document.getElementById('ttc').value = "";
            document.getElementById('matos_real').value = "";
            document.getElementById('matos_prev').value = "";
            document.getElementById('distance').value = "";
            document.getElementById('view-folders').style.display='none';
            document.getElementById('view-edit').style.display='block';
            calc();
        }

        function saveCurrent() {
            if(!currentId) return;
            const data = {
                id: currentId,
                name: document.getElementById('client').value || "Nouveau Chantier",
                ttc: document.getElementById('ttc').value,
                matos_real: document.getElementById('matos_real').value,
                matos_prev: document.getElementById('matos_prev').value,
                dist: document.getElementById('distance').value,
                jours: document.getElementById('jours').value,
                lastNet: document.getElementById('res-net').innerText,
                date: new Date().toLocaleDateString('fr-FR')
            };
            localStorage.setItem(currentId, JSON.stringify(data));
            let folders = JSON.parse(localStorage.getItem('ms_folders')) || [];
            folders = folders.filter(f => f.id !== currentId);
            folders.unshift(data);
            localStorage.setItem('ms_folders', JSON.stringify(folders.slice(0, 10)));
        }

        function openDossier(id) {
            currentId = id;
            const d = JSON.parse(localStorage.getItem(id));
            document.getElementById('client').value = d.name || "";
            document.getElementById('ttc').value = d.ttc || "";
            document.getElementById('matos_real').value = d.matos_real || "";
            document.getElementById('matos_prev').value = d.matos_prev || "";
            document.getElementById('distance').value = d.dist || "";
            document.getElementById('jours').value = d.jours || 1;
            document.getElementById('view-folders').style.display='none';
            document.getElementById('view-edit').style.display='block';
            setTimeout(calc, 100);
        }

        function renderFolders() {
            const list = document.getElementById('folder-list');
            const f = JSON.parse(localStorage.getItem('ms_folders')) || [];
            if(f.length === 0) list.innerHTML = "<p style='text-align:center; color:var(--gray); padding:20px;'>Aucun chantier enregistré.</p>";
            else {
                list.innerHTML = f.map(i => `
                    <div class="folder-item" onclick="openDossier('${i.id}')">
                        <div style="flex:1">
                            <b style="font-size:16px;">${i.name}</b><br>
                            <small style="color:var(--gray)">${i.date}</small>
                        </div>
                        <div style="text-align:right;">
                            <span style="font-weight:900; color:${i.lastNet.includes('-')?'var(--red)':'var(--green)'}">${i.lastNet}</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        function saveAndQuit() { saveCurrent(); document.getElementById('view-folders').style.display='block'; document.getElementById('view-edit').style.display='none'; renderFolders(); }
        function toggleSetup() { const s = document.getElementById('setup-view'); s.style.display = s.style.display==='none'?'block':'none'; }
        
        function saveGlobal() {
            localStorage.setItem('ms_global', JSON.stringify({
                r: document.getElementById('set-regime').value,
                u: document.getElementById('set-urssaf').value,
                k: document.getElementById('set-km').value,
                s: document.getElementById('set-salaire').value
            }));
            if(currentId) calc();
        }

        function loadGlobal() {
            const g = JSON.parse(localStorage.getItem('ms_global'));
            if(g) {
                document.getElementById('set-regime').value = g.r || 'micro';
                document.getElementById('set-urssaf').value = g.u || 21.2;
                document.getElementById('set-km').value = g.k || 0.60;
                document.getElementById('set-salaire').value = g.s || 180;
            }
        }
    </script>
</body>
</html>
