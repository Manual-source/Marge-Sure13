<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MARGE-SÛRE PRO : EXPERT BÂTIMENT</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180/0A84FF/FFFFFF?text=MS">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { 
            --p: #0A84FF; --bg: #000; --card: #1C1C1E; 
            --green: #32D74B; --red: #FF453A; --blue: #0A84FF; 
            --orange: #FF9500; --gray: #8E8E93; 
        }
        .theme-plombier { --p: #0A84FF; }
        .theme-elec { --p: #FFCC00; }
        .theme-peintre { --p: #32D74B; }

        * { -webkit-user-select: none; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; touch-action: manipulation; }
        input, select, textarea { -webkit-user-select: text !important; outline: none; }
        body { background-color: var(--bg); color: white; margin: 0; padding: env(safe-area-inset-top) 15px 140px 15px; transition: background 0.3s; }

        .card { background: var(--card); padding: 20px; border-radius: 22px; margin-bottom: 12px; border: 1px solid #2C2C2E; position: relative; }
        .net-display { font-size: 38px; font-weight: 900; color: var(--green); letter-spacing: -1px; margin: 5px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .info-bubble { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; background: #3A3A3C; color: white; border-radius: 50%; font-size: 11px; font-weight: bold; margin-left: 6px; cursor: pointer; }

        .grid-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }

        .tab { padding: 12px 18px; border-radius: 14px; background: #2C2C2E; color: var(--gray); font-size: 11px; font-weight: 800; border: none; min-width: 100px; flex-shrink: 0; cursor: pointer; transition: 0.2s; }
        .tab.active { background: var(--p); color: #000; }
        
        input, select { width: 100%; background: #2C2C2E; padding: 15px; border-radius: 12px; color: white; border: 1px solid #3A3A3C; font-size: 16px; }
        label { display: flex; align-items: center; color: var(--gray); font-size: 10px; font-weight: 800; margin-bottom: 4px; text-transform: uppercase; }
        .sub-label { font-size: 9px; color: var(--p); font-weight: 600; margin-bottom: 8px; display: block; }

        .btn-main { background: var(--p); color: #000; border: none; padding: 20px; border-radius: 18px; font-size: 14px; font-weight: 900; text-transform: uppercase; width: 100%; cursor: pointer; }
        .btn-add { background: var(--p); color: #000; border-radius: 12px; padding: 0 15px; border: none; font-weight: 900; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .photo-box { background: #2C2C2E; border-radius: 15px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; overflow: hidden; position: relative; border: 1px dashed #444; cursor: pointer; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; pointer-events: none; }
        .btn-del-photo { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 14px; z-index: 10; cursor: pointer; }

        .folder-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #1C1C1E; border-radius: 20px; margin-bottom: 10px; border: 1px solid #333; border-left: 5px solid var(--p); cursor: pointer; }
        .btn-delete-folder { background: transparent; border: none; color: var(--red); font-size: 18px; padding: 10px; cursor: pointer; margin-left: 10px; }
        
        .empty-state { text-align: center; padding: 40px 20px; background: #1C1C1E; border-radius: 20px; border: 1px dashed #444; color: var(--gray); font-size: 14px; line-height: 1.5; }

        .action-bar { position: fixed; bottom: 30px; left: 15px; right: 15px; display: flex; gap: 10px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 25px; backdrop-filter: blur(10px); }

        #matos-delta { font-size: 11px; font-weight: 800; margin-top: 10px; padding: 8px; border-radius: 8px; display: none; }

        .print-only { display: none; }

        @media print {
            body { background: white; color: black; padding: 0; }
            .card { border: 1px solid #ccc; background: white; break-inside: avoid; margin-bottom: 20px; padding: 15px; }
            .btn-main, .action-bar, .btn-add, .tab, #lock-screen, .info-bubble, .btn-del-photo, button { display: none !important; }
            input, select { border: none; background: white; color: black; padding: 5px; font-size: 14px; }
            .net-display { color: #000 !important; }
            .sub-label { color: #555; }
            .print-only { display: block !important; text-align: center; }
            .print-header { font-size: 28px; font-weight: 900; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #000; text-transform: uppercase; }
            .print-footer { position: fixed; bottom: 0; width: 100%; text-align: center; font-size: 10px; color: #888; border-top: 1px solid #eee; padding-top: 5px; font-style: italic; }
        }
    </style>
</head>
<body class="theme-plombier">

    <div id="lock-screen">
        <div style="font-size:35px; font-weight:900; color:white; margin-bottom:10px;">MARGE<span style="color:var(--p)">SÛRE</span></div>
        <div id="id-display" style="background:#1C1C1E; padding:10px; border-radius:12px; color:var(--p); font-weight:bold; margin-bottom:20px; border:1px solid #333;">ID : ...</div>
        <input type="number" id="keyIn" placeholder="CLÉ D'ACCÈS ARTISAN">
        <button class="btn-main" onclick="unlock()" style="margin-top:15px;">DÉVERROUILLER</button>
    </div>

    <div id="app" style="display:none;">
        <div id="view-folders">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:20px;">
                <h2 style="margin:0;">📂 MES CHANTIERS</h2>
                <button onclick="toggleSetup()" style="background:var(--card); border:1px solid #333; padding:10px; border-radius:15px; color:var(--p); font-size:10px; font-weight:800; cursor:pointer;">⚙️ CONFIG</button>
            </div>
            <div id="folder-list"></div>
            <button class="btn-main" style="background: var(--blue); color: white; margin-top: 20px;" onclick="createNewDossier()">+ NOUVEAU CHANTIER</button>
        </div>

        <div id="view-edit" style="display:none;">
            <div id="print-header" class="print-only print-header">MON ENTREPRISE</div>

            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
                <button onclick="saveAndQuit()" style="background:none; border:none; color:var(--p); font-weight:900; cursor:pointer;">⬅ RETOUR</button>
                <button onclick="shareBilan()" style="background:none; border:none; color:var(--orange); font-weight:900; cursor:pointer;">📤 PARTAGER</button>
            </div>

            <div class="header-audit" style="background: #1C1C1E; padding: 20px; border-radius: 20px; margin-bottom: 15px; text-align:center;">
                <div id="res-net" class="net-display">0 €</div>
                <div style="font-size:10px; font-weight:900; opacity:0.7; display:flex; justify-content:center; align-items:center;">
                    BÉNÉFICE NET RÉEL 
                    <span class="info-bubble" onclick="alert('C\'est ce qu\'il te reste réellement dans la poche une fois que tu as payé l\'État, tes matériaux, tes frais et ton propre salaire journalier.')">?</span>
                </div>
            </div>

            <div style="display:flex; gap:8px; margin-bottom:15px; overflow-x: auto; padding-bottom:5px;">
                <button id="tab-plombier" class="tab active" onclick="changeJob('plombier')">💧 PLOMBERIE</button>
                <button id="tab-elec" class="tab" onclick="changeJob('elec')">⚡ ÉLEC</button>
                <button id="tab-peintre" class="tab" onclick="changeJob('peintre')">🎨 PEINTURE</button>
            </div>

            <div class="card">
                <label>👤 CLIENT & CHANTIER</label>
                <input type="text" id="client" placeholder="Nom du client (ex: Mr Dupont)" oninput="calc()">
                <div class="grid-compare" style="margin-top:10px;">
                    <div>
                        <label>PRIX VENDU</label>
                        <span class="sub-label">(Saisir prix TTC)</span>
                        <input type="number" id="ttc" oninput="calc()" placeholder="Ex: 1500">
                    </div>
                    <div>
                        <label>RÉGIME TVA</label>
                        <select id="tva" onchange="calc()">
                            <option value="1.10">10%</option>
                            <option value="1.20">20%</option>
                            <option value="1.055">5.5%</option>
                            <option value="1.00">AUTO-ENTR. (0%)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="job-module" class="card"></div>

            <div class="card" style="border: 1px solid var(--p);">
                <label>
                    📦 MATÉRIEL
                </label>
                <span class="sub-label">(Saisir prix TTC)</span>
                <div class="grid-compare">
                    <div>
                        <input type="number" id="matos_prev" placeholder="Budget vendu au client" oninput="calc()">
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input type="number" id="matos_real" placeholder="Mes achats réels" oninput="calc()" style="flex:1">
                        <button class="btn-add" onclick="addTicket()">+</button>
                    </div>
                </div>
                <div id="matos-delta"></div>
            </div>

            <div class="card">
                <div class="grid-compare">
                    <div><label>DURÉE (JOURS)</label><input type="number" id="jours" placeholder="Ex: 3" oninput="calc()"></div>
                    <div>
                        <label>FRAIS DIVERS</label>
                        <input type="number" id="divers" placeholder="Péage, parking..." oninput="calc()">
                    </div>
                </div>
                <div style="margin-top:15px; padding-top:10px; border-top:1px solid #333;">
                    <label>URSSAF ESTIMÉ</label>
                    <div id="display-urssaf" style="font-weight:bold; color:var(--red); font-size: 18px; margin-top:5px;">0 €</div>
                </div>
            </div>

            <div class="card">
                <label>📸 PHOTOS DU CHANTIER</label>
                <div class="photo-grid">
                    <div class="photo-box" onclick="triggerPhoto('before')">
                        <div id="img-before-label">📷 AVANT</div>
                        <img id="img-before" src="" style="display:none;">
                        <button id="del-before" class="btn-del-photo" style="display:none;" onclick="deletePhoto(event, 'before')">🗑️</button>
                    </div>
                    <div class="photo-box" onclick="triggerPhoto('after')">
                        <div id="img-after-label">📷 APRÈS</div>
                        <img id="img-after" src="" style="display:none;">
                        <button id="del-after" class="btn-del-photo" style="display:none;" onclick="deletePhoto(event, 'after')">🗑️</button>
                    </div>
                </div>
                <input type="file" id="photo-input" hidden accept="image/*">
            </div>

            <div class="print-only print-footer">
                Généré par MARGE-SÛRE PRO : L'expert de votre rentabilité
            </div>

            <div class="action-bar">
                <button class="btn-main" style="background:#2C2C2E; color:white; flex:1;" onclick="preparePrint()">📄 PDF</button>
                <button class="btn-main" style="flex:2;" onclick="saveAndQuit()">💾 ENREGISTRER</button>
            </div>
        </div>

        <div id="setup-view" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:4000; padding:30px; overflow-y:auto;">
            <h2 style="color:var(--p);">⚙️ CONFIGURATION</h2>
            <div style="margin-bottom: 20px;">
                <label>NOM ENTREPRISE</label>
                <input type="text" id="set-company" placeholder="Ex: Dubois Plomberie" oninput="saveGlobal()">
            </div>
            <div style="margin-bottom: 20px; background: #1C1C1E; padding: 15px; border-radius: 15px; border: 1px solid #333;">
                <label style="color: white; font-size: 12px; margin-bottom: 10px;">RÉCUPÉRATION TVA ACHATS</label>
                <select id="set-recup-tva" onchange="saveGlobal()">
                    <option value="oui">Oui (Prix HT)</option>
                    <option value="non">Non (Prix TTC)</option>
                </select>
            </div>
            <div class="grid-compare" style="margin-bottom: 20px;">
                <div><label>% URSSAF</label><input type="number" id="set-urssaf" value="21.2" oninput="saveGlobal()"></div>
                <div><label>TVA ACHAT (%)</label><input type="number" id="set-tva-achat" value="20" oninput="saveGlobal()"></div>
            </div>
            <label>SALAIRE NET JOUR CIBLÉ (€)</label>
            <input type="number" id="set-salaire" value="150" oninput="saveGlobal()">
            <button class="btn-main" onclick="toggleSetup()" style="margin-top:25px;">FERMER & SAUVEGARDER</button>
        </div>
    </div>

    <script>
        let currentId = null;
        let activeJob = 'plombier';
        let photos = { before: null, after: null };

        window.onload = () => {
            const deviceID = localStorage.getItem('ms_id') || Math.floor(Math.random()*899)+101;
            localStorage.setItem('ms_id', deviceID);
            document.getElementById('id-display').innerText = "ID : " + deviceID;
            loadGlobal();
            if(localStorage.getItem('ms_ok') === 'true') run();
        };

        function unlock() {
            const k = document.getElementById('keyIn').value;
            if(k === "061266" || k === "2026") { localStorage.setItem('ms_ok', 'true'); run(); }
            else alert("Clé incorrecte");
        }

        function run() {
            document.getElementById('lock-screen').style.display='none';
            document.getElementById('app').style.display='block';
            renderFolders();
            changeJob('plombier');
        }

        function changeJob(j) {
            activeJob = j;
            document.body.className = 'theme-' + j;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + j).classList.add('active');
            const mod = document.getElementById('job-module');
            mod.classList.remove('fade-in');
            void mod.offsetWidth;
            mod.classList.add('fade-in');

            if(j === 'plombier') {
                mod.innerHTML = `<label>💧 SPÉCIFIQUE PLOMBERIE</label>
                    <div class="grid-compare">
                        <div><label>Pts d'eau</label><input type="number" id="field_1" oninput="calc()"></div>
                        <div><label>Linéaire (m)</label><input type="number" id="field_2" oninput="calc()"></div>
                    </div>`;
            } else if(j === 'elec') {
                mod.innerHTML = `<label>⚡ SPÉCIFIQUE ÉLEC</label>
                    <div class="grid-compare">
                        <div><label>Prises/Int.</label><input type="number" id="field_1" oninput="calc()"></div>
                        <div style="display:flex; align-items:center; gap:10px; background:#2C2C2E; border-radius:12px; padding:10px;">
                            <label style="margin:0">Tableau ?</label><input type="checkbox" id="field_2" style="width:25px" onchange="calc()">
                        </div>
                    </div>`;
            } else {
                mod.innerHTML = `<label>🎨 SPÉCIFIQUE PEINTURE</label>
                    <div class="grid-compare">
                        <div><label>Surface (m²)</label><input type="number" id="field_1" oninput="calc()"></div>
                        <div><label>Couches</label><input type="number" id="field_2" oninput="calc()"></div>
                    </div>`;
            }
            calc();
        }

        function calc() {
            if(!currentId) return;
            const ttc = parseFloat(document.getElementById('ttc').value) || 0;
            const tvaVente = parseFloat(document.getElementById('tva').value) || 1;
            const ht = ttc / tvaVente;
            
            const urssafRate = (parseFloat(document.getElementById('set-urssaf').value) || 0) / 100;
            const urssafAmount = ttc * urssafRate;
            document.getElementById('display-urssaf').innerText = Math.round(urssafAmount) + " €";

            const matosPrev = parseFloat(document.getElementById('matos_prev').value) || 0;
            const matosReal = parseFloat(document.getElementById('matos_real').value) || 0;
            const deltaDiv = document.getElementById('matos-delta');

            if (matosReal > 0 && matosPrev > 0) {
                deltaDiv.style.display = 'block';
                const diff = matosPrev - matosReal;
                if (diff < 0) {
                    deltaDiv.style.color = 'var(--red)';
                    deltaDiv.innerText = `⚠️ Budget matériel dépassé de ${Math.abs(diff).toFixed(2)} €`;
                } else {
                    deltaDiv.style.color = 'var(--green)';
                    deltaDiv.innerText = `✅ Économie de ${diff.toFixed(2)} € réalisée sur le budget`;
                }
            } else {
                deltaDiv.style.display = 'none';
            }

            const recupTva = document.getElementById('set-recup-tva').value;
            let matosHT = matosReal;
            if (recupTva === 'oui') {
                const tvaAchat = 1 + ((parseFloat(document.getElementById('set-tva-achat').value) || 20) / 100);
                matosHT = matosReal / tvaAchat;
            }

            const divers = parseFloat(document.getElementById('divers').value) || 0;
            const salaireCible = (parseFloat(document.getElementById('set-salaire').value) || 0) * (parseFloat(document.getElementById('jours').value) || 0);

            const netReal = ht - urssafAmount - matosHT - divers - salaireCible;
            const res = document.getElementById('res-net');
            res.innerText = Math.round(netReal) + " €";
            res.style.color = netReal < 0 ? "var(--red)" : "var(--green)";
            
            saveCurrent();
        }

        function triggerPhoto(type) {
            const input = document.getElementById('photo-input');
            input.onchange = e => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const max = 400;
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > max) { h *= max / w; w = max; } }
                        else { if (h > max) { w *= max / h; h = max; } }
                        canvas.width = w; canvas.height = h;
                        ctx.drawImage(img, 0, 0, w, h);
                        photos[type] = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('img-' + type).src = photos[type];
                        document.getElementById('img-' + type).style.display = 'block';
                        document.getElementById('del-' + type).style.display = 'flex';
                        saveCurrent();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function deletePhoto(event, type) {
            event.preventDefault(); event.stopPropagation();
            photos[type] = null;
            document.getElementById('img-' + type).style.display = 'none';
            document.getElementById('del-' + type).style.display = 'none';
            saveCurrent();
        }

        function shareBilan() {
            const ent = document.getElementById('set-company').value || "MON ENTREPRISE";
            const client = document.getElementById('client').value || "Client";
            const prix = document.getElementById('ttc').value || "0";
            const msg = `🛠️ ${ent} - BILAN DE CHANTIER\n👤 Client : ${client}\n💰 Montant TTC : ${prix}€\n✅ Généré via Marge-Sûre Pro.`;
            window.open("https://wa.me/?text=" + encodeURIComponent(msg));
        }

        function preparePrint() { 
            const entName = document.getElementById('set-company').value || "MON ENTREPRISE";
            document.getElementById('print-header').innerText = entName; 
            setTimeout(() => {
                window.print();
            }, 150);
        }

        function saveCurrent() {
            if(!currentId) return;
            const data = {
                id: currentId, job: activeJob,
                name: document.getElementById('client').value,
                ttc: document.getElementById('ttc').value,
                tva: document.getElementById('tva').value,
                matos_prev: document.getElementById('matos_prev').value,
                matos_real: document.getElementById('matos_real').value,
                jours: document.getElementById('jours').value,
                divers: document.getElementById('divers').value,
                f1: document.getElementById('field_1')?.value,
                f2: document.getElementById('field_2')?.type === 'checkbox' ? document.getElementById('field_2').checked : document.getElementById('field_2')?.value,
                photos: photos,
                lastNet: document.getElementById('res-net').innerText.replace(' €',''),
                date: new Date().toLocaleDateString('fr-FR')
            };
            localStorage.setItem(currentId, JSON.stringify(data));
            let folders = JSON.parse(localStorage.getItem('ms_folders')) || [];
            folders = folders.filter(f => f.id !== currentId);
            folders.unshift({id: data.id, name: data.name, lastNet: data.lastNet, date: data.date});
            localStorage.setItem('ms_folders', JSON.stringify(folders.slice(0, 10)));
        }

        function openDossier(id) {
            currentId = id;
            const d = JSON.parse(localStorage.getItem(id));
            changeJob(d.job || 'plombier');
            document.getElementById('client').value = d.name || "";
            document.getElementById('ttc').value = d.ttc || "";
            document.getElementById('tva').value = d.tva || "1.10";
            document.getElementById('matos_prev').value = d.matos_prev || "";
            document.getElementById('matos_real').value = d.matos_real || "";
            document.getElementById('jours').value = d.jours || "";
            document.getElementById('divers').value = d.divers || "";
            if(d.f1) document.getElementById('field_1').value = d.f1;
            if(d.f2 !== undefined) {
                if(typeof d.f2 === 'boolean') { if(document.getElementById('field_2')) document.getElementById('field_2').checked = d.f2; }
                else { if(document.getElementById('field_2')) document.getElementById('field_2').value = d.f2; }
            }
            photos = d.photos || {before:null, after:null};
            ['before','after'].forEach(t => {
                const imgEl = document.getElementById('img-'+t);
                const delEl = document.getElementById('del-'+t);
                if(photos[t]) {
                    imgEl.src = photos[t];
                    imgEl.style.display = 'block';
                    delEl.style.display = 'flex';
                } else {
                    imgEl.style.display = 'none';
                    delEl.style.display = 'none';
                }
            });
            document.getElementById('view-folders').style.display='none';
            document.getElementById('view-edit').style.display='block';
            calc();
        }

        function deleteDossier(id, event) {
            event.stopPropagation();
            if(confirm("Supprimer ce chantier ?")) {
                localStorage.removeItem(id);
                let folders = JSON.parse(localStorage.getItem('ms_folders')) || [];
                folders = folders.filter(f => f.id !== id);
                localStorage.setItem('ms_folders', JSON.stringify(folders));
                renderFolders();
            }
        }

        function createNewDossier() {
            currentId = 'd_' + Date.now();
            photos = {before:null, after:null};
            ['client','ttc','matos_prev','matos_real','jours','divers'].forEach(i => document.getElementById(i).value="");
            ['before', 'after'].forEach(t => {
                document.getElementById('img-'+t).style.display = 'none';
                document.getElementById('del-'+t).style.display = 'none';
            });
            document.getElementById('view-folders').style.display='none';
            document.getElementById('view-edit').style.display='block';
            calc();
        }

        function renderFolders() {
            const list = document.getElementById('folder-list');
            const f = JSON.parse(localStorage.getItem('ms_folders')) || [];
            if (f.length === 0) {
                list.innerHTML = `<div class="empty-state">Clique sur <b>+ NOUVEAU CHANTIER</b>.</div>`;
            } else {
                list.innerHTML = f.map(i => `
                    <div class="folder-item" onclick="openDossier('${i.id}')">
                        <div style="flex:1"><b>${i.name || 'Nouveau Chantier'}</b><br><small>${i.date}</small></div>
                        <div style="font-weight:900; color:${i.lastNet<0?'var(--red)':'var(--green)'}; text-align:right;">
                            ${i.lastNet} €
                        </div>
                        <button class="btn-delete-folder" onclick="deleteDossier('${i.id}', event)">🗑️</button>
                    </div>`).join('');
            }
        }

        function saveAndQuit() { saveCurrent(); document.getElementById('view-folders').style.display='block'; document.getElementById('view-edit').style.display='none'; renderFolders(); }
        function toggleSetup() { const s = document.getElementById('setup-view'); s.style.display = s.style.display==='none'?'block':'none'; }
        
        function loadGlobal() { 
            const g = JSON.parse(localStorage.getItem('ms_global')); 
            if(g) { 
                document.getElementById('set-company').value=g.c || ""; 
                document.getElementById('set-urssaf').value=g.u || 21.2; 
                document.getElementById('set-tva-achat').value=g.t || 20; 
                document.getElementById('set-salaire').value=g.s || 150; 
                document.getElementById('set-recup-tva').value=g.r || "oui";
            } 
        }
        
        function saveGlobal() { 
            localStorage.setItem('ms_global', JSON.stringify({ 
                c: document.getElementById('set-company').value, 
                u: document.getElementById('set-urssaf').value, 
                t: document.getElementById('set-tva-achat').value, 
                s: document.getElementById('set-salaire').value,
                r: document.getElementById('set-recup-tva').value
            }));
            if(currentId) calc();
        }
        
        function addTicket() { 
            const v = prompt("Montant du ticket de caisse :"); 
            if(v) { 
                const input = document.getElementById('matos_real');
                input.value = (parseFloat(input.value||0) + parseFloat(v.replace(',','.'))).toFixed(2); 
                calc(); 
            } 
        }
    </script>
</body>
</html>
